name: Curación diaria

on:
  schedule:
    # 06:10 UTC ≈ 08:10 en España (invierno) / 08:10–07:10 según horario de verano
    - cron: "10 6 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Modelo de Claude (opcional)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Curar la lectura de hoy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ github.event.inputs.model }}
        run: npm run curate

      - name: Commit y push
        run: |
          git config user.name  "reader-bot"
          git config user.email "actions@github.com"
          git add data/latest.json data/archive/
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar."
          else
            git commit -m "Curación $(date -u +%Y-%m-%d)"
            for i in 1 2 3 4; do
              git push origin HEAD:${{ github.ref_name }} && break
              echo "push falló, reintento en $((2**i))s"; sleep $((2**i))
              git pull --rebase origin ${{ github.ref_name }} || true
            done
          fi
